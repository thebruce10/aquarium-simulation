<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aquarium Simulation</title>
    <link rel="icon" type="/image/x-icon" href="images/favicon.ico">

    <script src="libs/three.js"></script>
    
    <script src="libs/physi.js"></script>
    <script src="libs/OrbitControls.js"></script>
    <script src="libs/MTLLoader.js"></script>
    <script src="libs/OBJMTLLoader.js"></script>

    <link href="main.css" rel="stylesheet">
    
</head>
<body>
    <div class="menuBar">
        <ul class="menuList">
            <li class="menuItem left">
                <button class="menuButton large" id="fileMenuButton">File</button>
                <div class="subMenuBar" id="fileSubMenuBar">
                    <ul class="subMenuList">
                        <li class="subMenuItem"><button class="subMenuButton" id="resetSubMenuButton">Reset</button></li>
                    </ul>
                </div>
            </li>

            <li class="menuItem left">
                <button class="menuButton large" id="viewMenuButton">View</button>
                <div class="subMenuBar" id="viewSubMenuBar">
                    <ul class="subMenuList">
                        <li class="subMenuItem"><button class="subMenuButton" id="editorSubMenuButton">Editor</button></li>
                        <li class="subMenuItem"><button class="subMenuButton" id="immersiveSubMenuButton">Immersive</button></li>
                    </ul>
                </div>
            </li>

            <li class="menuItem right"><button class="menuButton small" id="deleteMenuButton">🗑️</button></li>
            <li class="menuItem right"><button class="menuButton small" id="screenshotMenuButton">📸</button></li>
        </ul>
        
    </div>

    

    <div class="popup" id="resetPopup">
        <span class="popupText">Are you sure you want to reset?<br>This will remove everything in the scene.</span>
        <button class="popupButton secondary" id="noResetPopupButton">No</button>
        <button class="popupButton primary" id="yesResetPopupButton">Yes</button>
    </div>

    <div class="popup" id="deletePopup">
        <span class="popupText">Are you sure you want to delete the selected object?</span>
        <button class="popupButton secondary" id="noDeletePopupButton">No</button>
        <button class="popupButton primary" id="yesDeletePopupButton">Yes</button>
    </div>



    <div class="toolBar" id="objectToolBar">
        <div class="toolBarTop">
            <span class="toolBarText top">Object</span>
        </div>
        <div class="toolBarContent">
            <p class="toolBarText">Name</p>
            <input type="text" class="toolBarInput large" id="nameObjectToolBarInput" value="Seaweed">
            <div style="height: 10px;"></div>

            <span class="toolBarText">Location</span>

            <div class="toolBarGrid">
                <span class="toolBarText small">X</span>
                <span class="toolBarText small">Y</span>
                <span class="toolBarText small">Z</span>
                <input type="number" class="toolBarInput small" id="locationXObjectToolBarInput">
                <input type="number" class="toolBarInput small" id="locationYObjectToolBarInput">
                <input type="number" class="toolBarInput small" id="locationZObjectToolBarInput">
            </div>
            <div style="height: 10px;"></div>

            <span class="toolBarText">Rotation</span>
            <div class="toolBarGrid">
                <span class="toolBarText small">X</span>
                <span class="toolBarText small">Y</span>
                <span class="toolBarText small">Z</span>
                <input type="number" class="toolBarInput small" id="rotationXObjectToolBarInput">
                <input type="number" class="toolBarInput small" id="rotationYObjectToolBarInput">
                <input type="number" class="toolBarInput small" id="rotationZObjectToolBarInput">
            </div>



            
            
            
            
        </div>
    </div>




    <div class="bottomBar">
        <span class="bottomBarText left"><img src="images/favicon.svg">&nbspAquarium Simulation</span>
        <!-- <span class="bottomBarText right"><a href="/"><img src="images/the-dank-web-logo.png"></a></span> -->
    </div>


    <script src="main.js" type="module"></script>

</body>
</html>
